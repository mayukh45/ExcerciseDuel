AWSTemplateFormatVersion: "2010-09-09"
Description: Move Together web hosting — private S3 bucket served over HTTPS via CloudFront (Origin Access Control). No public bucket.

Resources:
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      # Bucket stays fully private; only CloudFront can read it (see BucketPolicy).
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  OAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        Origins:
          - Id: s3origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt OAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: s3origin
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          # AWS-managed "CachingOptimized" policy.
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        # Single-page app: serve index.html for any unknown path. With OAC + a
        # private bucket, a missing key comes back as 403, so map that too.
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${SiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution.Id}"

Outputs:
  BucketName:
    Description: S3 bucket the web build is uploaded to.
    Value: !Ref SiteBucket
  DistributionId:
    Description: CloudFront distribution id (for cache invalidation).
    Value: !Ref Distribution
  Url:
    Description: Open this on both phones — add it to your home screen.
    Value: !Sub "https://${Distribution.DomainName}"
